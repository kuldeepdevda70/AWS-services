apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalogue
  namespace: three-tier
  labels:
    service: catalogue

spec:
  replicas: 1

  selector:
    matchLabels:
      service: catalogue

  template:
    metadata:
      labels:
        service: catalogue

    spec:
      containers:
      - name: catalogue
        image: robotshop/rs-catalogue:latest
        imagePullPolicy: IfNotPresent

        ports:
        - containerPort: 8080

        env:
        - name: MONGO_URL
          value: "mongodb://mongodb:27017/catalogue"

        - name: MONGO_PORT
          value: "27017"

        resources:
          requests:
            cpu: 100m
            memory: 50Mi
          limits:
            cpu: 200m
            memory: 100Mi